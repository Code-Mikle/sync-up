# Production profile. Do not commit real secrets here.
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${PROD_MYSQL_URL}
    username: ${PROD_MYSQL_USERNAME}
    password: ${PROD_MYSQL_PASSWORD}
  data:
    redis:
      host: ${PROD_REDIS_HOST}
      port: ${PROD_REDIS_PORT:6379}
      database: ${PROD_REDIS_DATABASE:0}
      password: ${PROD_REDIS_PASSWORD:}

server:
  address: 0.0.0.0
  port: ${PROD_SERVER_PORT:8080}
